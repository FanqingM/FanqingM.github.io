short_bio: >-
  <p>
    I am a PhD student in Computer Science at the
    <a href="https://www.comp.nus.edu.sg/" target="_blank">National University of Singapore</a>
    and CTO at <a href="https://evolvent.co/en" target="_blank">Evolvent AI</a>.
    My research focuses on <strong>multimodal reasoning</strong>,
    <strong>reinforcement learning</strong>, and <strong>self-evolving agents</strong>.
  </p>
  <p>
    I am interested in building AI systems that improve through data, feedback, and experience.
    My work spans multimodal benchmarks, rule-based RL, model evaluation, and scalable data engines.
    Previously, I conducted research at Kimi and Shanghai AI Laboratory.
  </p>

